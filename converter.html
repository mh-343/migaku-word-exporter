<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Migaku Word Exporter</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Space+Mono:wght@700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
    <script src="pako.min.js"></script>
    <script src="sql-wasm.js"></script>
    <style>
        :root {
            --bg:              #07090e;
            --surface:         #0d1018;
            --surface-2:       #121520;
            --border:          #1a1f2e;
            --border-hover:    #252d42;
            --text:            #b8c0d4;
            --text-dim:        #6a748a;
            --text-muted:      #363d52;

            --known:           #34d399;
            --known-glow:      rgba(52, 211, 153, 0.18);
            --known-border:    rgba(52, 211, 153, 0.3);
            --known-bg:        rgba(52, 211, 153, 0.06);

            --learning:        #fbbf24;
            --learning-glow:   rgba(251, 191, 36, 0.18);
            --learning-border: rgba(251, 191, 36, 0.3);
            --learning-bg:     rgba(251, 191, 36, 0.06);

            --unknown:         #818cf8;
            --unknown-glow:    rgba(129, 140, 248, 0.18);
            --unknown-border:  rgba(129, 140, 248, 0.3);
            --unknown-bg:      rgba(129, 140, 248, 0.06);

            --ignored:         #3d4558;
            --ignored-glow:    rgba(61, 69, 88, 0.35);
            --ignored-border:  rgba(61, 69, 88, 0.6);
            --ignored-bg:      rgba(61, 69, 88, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            color: var(--text);
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 70% 40% at 50% 0%, rgba(100, 110, 200, 0.07) 0%, transparent 60%),
                radial-gradient(ellipse 40% 30% at 85% 90%, rgba(52, 211, 153, 0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 560px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        /* ── HEADER ── */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }

        .eyebrow {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 46px;
            font-weight: 600;
            color: #d4d8e8;
            letter-spacing: -0.01em;
            line-height: 1;
        }

        h1 em {
            font-style: italic;
            color: var(--unknown);
        }

        /* ── CARD ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 14px;
        }

        /* ── LOADING ── */
        .loading-label {
            font-size: 12px;
            font-weight: 400;
            letter-spacing: 0.08em;
            color: var(--text-dim);
            text-align: center;
            margin-bottom: 18px;
        }

        .progress-bar-track {
            width: 100%;
            height: 2px;
            background: var(--border);
            border-radius: 99px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--unknown), var(--known));
            border-radius: 99px;
            animation: sweep 1.6s ease-in-out infinite;
        }

        @keyframes sweep {
            0%   { width: 0%;  margin-left: 0%; }
            50%  { width: 55%; margin-left: 22%; }
            100% { width: 0%;  margin-left: 100%; }
        }

        /* ── STATS / FILTERS ── */
        .section-label {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 8px;
        }

        .stat {
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px 10px 14px;
            text-align: center;
            cursor: pointer;
            user-select: none;
            transition: all 0.22s ease;
            opacity: 0.38;
            position: relative;
            overflow: hidden;
        }

        .stat::after {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.22s ease;
        }

        .stat:hover { opacity: 0.6; border-color: var(--border-hover); }

        .stat.selected { opacity: 1; }

        .stat.known::after      { background: var(--known-bg); }
        .stat.learning::after   { background: var(--learning-bg); }
        .stat.unknown::after    { background: var(--unknown-bg); }
        .stat.ignored::after    { background: var(--ignored-bg); }

        .stat.known.selected    { border-color: var(--known-border);    box-shadow: 0 0 22px var(--known-glow); }
        .stat.learning.selected { border-color: var(--learning-border); box-shadow: 0 0 22px var(--learning-glow); }
        .stat.unknown.selected  { border-color: var(--unknown-border);  box-shadow: 0 0 22px var(--unknown-glow); }
        .stat.ignored.selected  { border-color: var(--ignored-border);  box-shadow: 0 0 18px var(--ignored-glow); }

        .stat.selected::after { opacity: 1; }

        .stat-num {
            font-family: 'Space Mono', monospace;
            font-size: 20px;
            font-weight: 700;
            color: var(--text-dim);
            line-height: 1;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
            transition: color 0.22s ease;
        }

        .stat.known.selected    .stat-num { color: var(--known); }
        .stat.learning.selected .stat-num { color: var(--learning); }
        .stat.unknown.selected  .stat-num { color: var(--unknown); }
        .stat.ignored.selected  .stat-num { color: #5a6478; }

        .stat-label {
            font-size: 9px;
            font-weight: 500;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--text-muted);
            position: relative;
            z-index: 1;
            transition: color 0.22s ease;
        }

        .stat.selected .stat-label { color: var(--text-dim); }

        /* ── FILTER HINT ── */
        .filter-hint {
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
            margin-top: 8px;
            margin-bottom: 24px;
            letter-spacing: 0.02em;
        }

        .filter-hint span {
            color: var(--text-dim);
            font-variant-numeric: tabular-nums;
        }

        /* ── DIVIDER ── */
        .divider {
            height: 1px;
            background: var(--border);
            margin: 0 -30px 24px;
        }

        /* ── DOWNLOAD BUTTONS ── */
        .buttons { display: flex; gap: 8px; }

        .btn {
            flex: 1;
            padding: 13px 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--surface-2);
            color: var(--text-dim);
            font-family: 'DM Sans', sans-serif;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
        }

        .btn svg {
            width: 14px;
            height: 14px;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .btn:hover {
            border-color: var(--border-hover);
            color: var(--text);
            background: #161b28;
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }

        .btn:hover svg { opacity: 1; }
        .btn:active { transform: translateY(0); box-shadow: none; }

        /* ── ERROR ── */
        .hidden { display: none; }

        .error {
            background: rgba(239, 68, 68, 0.07);
            border: 1px solid rgba(239, 68, 68, 0.18);
            color: #f87171;
            padding: 16px 20px;
            border-radius: 12px;
            font-size: 13px;
            line-height: 1.5;
            text-align: center;
        }

        /* ── FOOTER ── */
        .footer {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 10px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .footer::before,
        .footer::after {
            content: '';
            display: block;
            width: 30px;
            height: 1px;
            background: var(--border);
        }
    </style>
</head>
<body>
    <div class="container">

        <div class="header">
            <p class="eyebrow">Chrome Extension</p>
            <h1>Migaku <em>Words</em></h1>
        </div>

        <div class="card" id="loading-card">
            <p class="loading-label">Processing your vocabulary&hellip;</p>
            <div class="progress-bar-track">
                <div class="progress-bar-fill"></div>
            </div>
        </div>

        <div class="card hidden" id="results-card">
            <p class="section-label">Vocabulary</p>
            <div class="stats">
                <div class="stat known selected" id="filter-known" title="Toggle Known">
                    <div class="stat-num" id="stat-known">0</div>
                    <div class="stat-label">Known</div>
                </div>
                <div class="stat learning" id="filter-learning" title="Toggle Learning">
                    <div class="stat-num" id="stat-learning">0</div>
                    <div class="stat-label">Learning</div>
                </div>
                <div class="stat unknown" id="filter-unknown" title="Toggle Unknown">
                    <div class="stat-num" id="stat-unknown">0</div>
                    <div class="stat-label">Unknown</div>
                </div>
                <div class="stat ignored" id="filter-ignored" title="Toggle Ignored">
                    <div class="stat-num" id="stat-ignored">0</div>
                    <div class="stat-label">Ignored</div>
                </div>
            </div>
            <p class="filter-hint">Select categories &mdash; <span id="filter-count">0</span> words</p>
            <div class="divider"></div>
            <div class="buttons">
                <button class="btn" id="btn-json">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                    </svg>
                    JSON
                </button>
                <button class="btn" id="btn-txt">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                    </svg>
                    TXT
                </button>
                <button class="btn" id="btn-csv">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
                    </svg>
                    CSV
                </button>
            </div>
        </div>

        <div class="card hidden" id="error-card">
            <div class="error" id="error-message"></div>
        </div>

        <p class="footer">All processing happens locally &mdash; no data is uploaded</p>

    </div>
    <script src="converter.js"></script>
</body>
</html>
