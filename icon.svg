<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="base" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#6ee7b7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="38" fill="url(#bg)"/>

  <!-- Download arrow: vertical line -->
  <line x1="64" y1="28" x2="64" y2="74"
        stroke="white" stroke-width="10" stroke-linecap="round"/>

  <!-- Arrow head -->
  <polyline points="42,56 64,78 86,56"
            fill="none" stroke="white" stroke-width="10"
            stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Base line (green accent) -->
  <line x1="36" y1="96" x2="92" y2="96"
        stroke="url(#base)" stroke-width="8" stroke-linecap="round"/>
</svg>
