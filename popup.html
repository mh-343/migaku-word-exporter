<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
      color: #333;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      margin: -20px -20px 20px -20px;
      text-align: center;
    }
    h1 { font-size: 18px; margin-bottom: 4px; }
    .subtitle { font-size: 13px; opacity: 0.9; }
    .step {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
    }
    .step-num {
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 13px;
      flex-shrink: 0;
    }
    .step-text {
      font-size: 14px;
      line-height: 1.5;
    }
    .step-text a {
      color: #667eea;
      text-decoration: none;
      font-weight: 500;
    }
    .step-text a:hover {
      text-decoration: underline;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      margin-top: 16px;
    }
    .btn:hover {
      opacity: 0.9;
    }
    .footer {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #eee;
      font-size: 12px;
      color: #888;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Migaku Word Exporter</h1>
    <div class="subtitle">Export your vocabulary data</div>
  </div>

  <div class="step">
    <div class="step-num">1</div>
    <div class="step-text">
      Go to <a href="https://study.migaku.com" target="_blank">study.migaku.com</a> and make sure you're logged in
    </div>
  </div>

  <div class="step">
    <div class="step-num">2</div>
    <div class="step-text">
      Click the purple <strong>"Export Words"</strong> button in the bottom-right corner
    </div>
  </div>

  <div class="step">
    <div class="step-num">3</div>
    <div class="step-text">
      Your words will be downloaded as a JSON file
    </div>
  </div>

  <a href="https://study.migaku.com" target="_blank" class="btn">
    Open study.migaku.com
  </a>

  <div class="footer">
    Your data stays local. Nothing is uploaded.
  </div>
</body>
</html>
