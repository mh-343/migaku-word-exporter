<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;1,500&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 300px;
      background: #07090e;
      font-family: 'DM Sans', -apple-system, sans-serif;
      color: #9aa5be;
      overflow: hidden;
    }

    /* atmospheric glow */
    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; height: 120px;
      background: radial-gradient(ellipse 80% 80% at 50% 0%, rgba(100, 110, 200, 0.12) 0%, transparent 100%);
      pointer-events: none;
    }

    .header {
      padding: 22px 20px 18px;
      text-align: center;
      border-bottom: 1px solid #1a1f2e;
      position: relative;
    }

    .eyebrow {
      font-size: 9px;
      font-weight: 500;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #363d52;
      margin-bottom: 6px;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 600;
      color: #d4d8e8;
      letter-spacing: -0.01em;
      line-height: 1;
    }

    h1 em {
      font-style: italic;
      color: #818cf8;
    }

    .body { padding: 18px 20px; }

    .step {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }

    .step-num {
      width: 20px;
      height: 20px;
      border: 1px solid #1a1f2e;
      background: #0d1018;
      color: #818cf8;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 1px;
      font-family: 'DM Sans', sans-serif;
    }

    .step-text {
      font-size: 13px;
      line-height: 1.55;
      color: #7a8299;
    }

    .step-text strong { color: #9aa5be; font-weight: 500; }

    .step-text a {
      color: #818cf8;
      text-decoration: none;
    }

    .step-text a:hover { text-decoration: underline; }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px;
      background: #0d1018;
      border: 1px solid #1a1f2e;
      border-radius: 12px;
      color: #9aa5be;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      margin-top: 18px;
      transition: all 0.2s ease;
    }

    .btn svg { width: 14px; height: 14px; opacity: 0.6; }

    .btn:hover {
      border-color: #252d42;
      color: #d4d8e8;
      background: #111520;
    }

    .btn:hover svg { opacity: 1; }

    .footer {
      margin: 14px 0 0;
      padding-top: 14px;
      border-top: 1px solid #1a1f2e;
      font-size: 10px;
      letter-spacing: 0.06em;
      color: #363d52;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <p class="eyebrow">Chrome Extension</p>
    <h1>Migaku <em>Words</em></h1>
  </div>

  <div class="body">
    <div class="step">
      <div class="step-num">1</div>
      <div class="step-text">
        Go to <a href="https://study.migaku.com" target="_blank">study.migaku.com</a> and make sure you're logged in
      </div>
    </div>

    <div class="step">
      <div class="step-num">2</div>
      <div class="step-text">
        Click the <strong>"Export Words"</strong> button in the bottom-right corner
      </div>
    </div>

    <div class="step">
      <div class="step-num">3</div>
      <div class="step-text">
        A new tab opens — select categories and download your words
      </div>
    </div>

    <a href="https://study.migaku.com" target="_blank" class="btn">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
      </svg>
      Open study.migaku.com
    </a>

    <div class="footer">Your data stays local &mdash; nothing is uploaded</div>
  </div>
</body>
</html>
